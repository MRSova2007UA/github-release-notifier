openapi: 3.0.0
info:
  title: GitHub Release Notifier API
  description: |
    API для підписки на повідомлення про нові релізи GitHub репозиторіїв.
    
    Extra Features (Реалізовано):
    * gRPC & REST: Сервіс реалізовано як гібридний моноліт. Він обробляє як REST, так і gRPC запити на одному порту (8080) за допомогою мультиплексора cmux.
    * Redis Cache: Запити до GitHub API кешуються в Redis з TTL 10 хвилин.
    * Prometheus Metrics: Доступний ендпоїнт `/metrics` для збору телеметрії.
  version: 1.0.0
servers:
  - url: https://github-release-notifier-3.onrender.com
    description: Продакшен сервер (Render)
  - url: http://localhost:8080
    description: Локальний сервер (через Docker)
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
paths:
  /api/subscribe:
    post:
      summary: Підписатися на релізи репозиторію
      description: Додає email користувача до списку підписників на вказаний GitHub репозиторій.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - repository
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                repository:
                  type: string
                  example: golang/go
      responses:
        '200':
          description: Успішна підписка
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Успішно підписано на оновлення!
        '400':
          description: Неправильний формат запиту або репозиторію (наприклад, немає слеша)
        '401':
          description: Неавторизовано (відсутній або неправильний заголовок X-API-Key)
        '404':
          description: Репозиторій не знайдено на GitHub
        '429':
          description: Перевищено ліміт запитів до GitHub API
        '500':
          description: Внутрішня помилка сервера
  /metrics:
    get:
      summary: Отримати метрики Prometheus
      description: Ендпоїнт для збору системних метрик та кастомних лічильників (наприклад, кількості запитів до GitHub API).
      responses:
        '200':
          description: Успішне отримання метрик
          content:
            text/plain:
              schema:
                type: string
  /ping:
    get:
      summary: Перевірка статусу сервера (Healthcheck)
      description: Простий ендпоїнт для перевірки працездатності сервера.
      responses:
        '200':
          description: Сервер працює
          content:
            text/plain:
              schema:
                type: string
                example: pong
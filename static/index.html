<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Release Notifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Підписка на релізи GitHub</h1>

    <form id="subscribeForm" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Ваш Email</label>
            <input type="email" id="email" required placeholder="name@example.com"
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div>
            <label for="repository" class="block text-sm font-medium text-gray-700">Репозиторій (owner/repo)</label>
            <input type="text" id="repository" required placeholder="golang/go"
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>

        <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
            Підписатися
        </button>
    </form>

    <div id="message" class="mt-4 text-center text-sm font-medium hidden p-3 rounded"></div>
</div>

<script>
    document.getElementById('subscribeForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const repository = document.getElementById('repository').value;
        const messageDiv = document.getElementById('message');
        const btn = document.querySelector('button');

        // Показуємо завантаження
        btn.textContent = 'Відправка...';
        btn.disabled = true;
        messageDiv.className = 'mt-4 text-center text-sm font-medium hidden p-3 rounded';

        try {
            const response = await fetch('/api/subscribe', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': 'super-secret-key-123' // Наш ключ
                },
                body: JSON.stringify({ email, repository })
            });

            const data = await response.json();

            messageDiv.classList.remove('hidden');
            if (response.ok) {
                messageDiv.classList.add('bg-green-100', 'text-green-800');
                messageDiv.textContent = 'Успіх: ' + data.message;
                document.getElementById('subscribeForm').reset();
            } else {
                messageDiv.classList.add('bg-red-100', 'text-red-800');
                messageDiv.textContent = 'Помилка: ' + (data.error || 'Щось пішло не так');
            }
        } catch (error) {
            messageDiv.classList.remove('hidden');
            messageDiv.classList.add('bg-red-100', 'text-red-800');
            messageDiv.textContent = 'Помилка з\'єднання з сервером';
        } finally {
            btn.textContent = 'Підписатися';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
